<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Volumetric Cloud - Fragment Forced White</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #renderCanvas { width: 100vw; height: 100vh; display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; background: rgba(0,0,0,0.7); padding: 8px 14px; border-radius: 4px; font-size: 13px; z-index: 10; pointer-events: none; }
        #status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #0f0; font-family: monospace; font-size: 13px; background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 4px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">🎯 终极排查：Fragment Shader 硬写死白色半透明</div>
    <div id="status">🔄 如果看到半透明白色 → Shader 管线正常 | 如果纯黑 → 几何体/矩阵/编译有问题</div>
    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
        const canvas = document.getElementById('renderCanvas');
        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);

        // ---- 摄像机在原点 ----
        const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI / 3, Math.PI / 4, 5,
            new BABYLON.Vector3(0, 0, 0), scene);
        camera.attachControl(canvas, true);

        // ---- 场景参考 ----
        const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 10, height: 10 }, scene);
        const gMat = new BABYLON.StandardMaterial("gMat", scene);
        gMat.diffuseColor = new BABYLON.Color3(0.15, 0.25, 0.15);
        gMat.alpha = 0.3;
        ground.material = gMat;

        const pillar = BABYLON.MeshBuilder.CreateCylinder("pillar", { height: 2, diameter: 0.1 }, scene);
        pillar.position.y = 1;
        const pMat = new BABYLON.StandardMaterial("pMat", scene);
        pMat.diffuseColor = new BABYLON.Color3(1, 0.6, 0);
        pillar.material = pMat;

        // ========== 顶点着色器 — 标准输出 ==========
        BABYLON.Effect.ShadersStore["volCloudVert"] = `
            precision highp float;
            attribute vec3 position;
            attribute vec2 uv;
            uniform mat4 worldViewProjection;
            uniform mat4 world;
            varying vec2 vUv;
            varying vec3 vWorldPos;
            void main() {
                vUv = uv;
                vWorldPos = (world * vec4(position, 1.0)).xyz;
                gl_Position = worldViewProjection * vec4(position, 1.0);
            }
        `;

        // ========== 片段着色器 — 硬写死白色 ==========
        BABYLON.Effect.ShadersStore["volCloudFrag"] = `
            precision highp float;
            varying vec2 vUv;
            varying vec3 vWorldPos;
            uniform vec3 cameraPosition;
            uniform float time;
            uniform float cloudDensity;
            uniform vec3 windDirection;
            uniform vec3 lightDir;
            uniform vec3 lightColor;
            uniform float cloudHeight;
            uniform float cloudScale;

            void main() {
                // 🔥 杀手锏：直接无视所有逻辑，强制输出白色半透明
                gl_FragColor = vec4(1.0, 1.0, 1.0, 0.5);
                return; // 直接返回
            }
        `;

        // ========== 天空盒 ==========
        const skybox = BABYLON.MeshBuilder.CreateBox("skybox", { size: 2 }, scene);
        skybox.infiniteDistance = true;
        skybox.isPickable = false;

        const mat = new BABYLON.ShaderMaterial("volCloud", scene, {
            vertexElement: "volCloudVert",
            fragmentElement: "volCloudFrag",
        }, {
            attributes: ["position", "uv"],
            uniforms: [
                "world", "worldViewProjection",
                "cameraPosition", "time",
                "cloudDensity", "windDirection",
                "lightDir", "lightColor",
                "cloudHeight", "cloudScale"
            ],
            needAlphaBlending: true,
        });

        mat.backFaceCulling = false;
        mat.disableDepthWrite = true;
        skybox.material = mat;

        // ---- 设置参数 ----
        mat.setFloat("time", 0);
        mat.setVector3("cameraPosition", camera.position);
        mat.setFloat("cloudDensity", 1.0);
        mat.setVector3("windDirection", new BABYLON.Vector3(1, 0, 0));
        mat.setVector3("lightDir", new BABYLON.Vector3(-0.5, -1, -0.5));
        mat.setColor3("lightColor", new BABYLON.Color3(1, 1, 1));
        mat.setFloat("cloudHeight", 0.5);
        mat.setFloat("cloudScale", 1.0);

        // ---- 控制台 ----
        console.log("=== 强制白色测试 ===");
        console.log("mat.isReady:", mat.isReady());

        engine.runRenderLoop(() => scene.render());
        window.addEventListener('resize', () => engine.resize());
    </script>
</body>
</html>

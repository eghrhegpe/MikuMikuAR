version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the application for Linux
    deps:
      - task: common:build:frontend
    cmds:
      - go build -tags production -o "{{.BIN_DIR}}/{{.APP_NAME}}"
    vars:
      BIN_DIR: "bin"
      APP_NAME: "MikuMikuAR"

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'

  package:
    summary: Packages the application
    cmds:
      - task: build
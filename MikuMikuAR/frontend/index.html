<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MikuMikuAR</title>
    <link rel="icon" href="data:,">
    <!-- Babylon.js 必须在主 bundle 之前加载 -->
    <script src="/lib/babylon.js"></script>
    <script src="/lib/babylonjs.materials.min.js"></script>
    <link href="./src/app.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <canvas id="renderCanvas"></canvas>

        <!-- Loading overlay -->
        <div id="loading"><div class="spinner"></div><span id="loadingText">加载中</span></div>

        <!-- Bottom Navigation Bar -->
        <div id="bottomNav">
            <button class="nav-tab" id="btnMainAction" title="模型库" aria-label="模型库" aria-controls="sceneOverlay" data-popup-type="model" data-hint="浏览和加载 PMX 模型 · Ctrl+1" data-shortcut="1">
                <iconify-icon icon="tabler:cube-3d-sphere"></iconify-icon><span class="nav-label">模型</span>
                <span class="shortcut-badge">1</span>
            </button>
            <button class="nav-tab" id="btnMotionPopup" title="动作库" aria-label="动作库" aria-controls="sceneOverlay" data-popup-type="motion" data-hint="浏览和加载 VMD 动作 · Ctrl+2" data-shortcut="2">
                <iconify-icon icon="lucide:music"></iconify-icon><span class="nav-label">动作</span>
                <span class="shortcut-badge">2</span>
            </button>
            <button class="nav-tab" id="btnScene" title="场景" aria-label="场景" aria-controls="sceneOverlay" data-popup-type="scene" data-hint="相机、灯光和渲染设置 · Ctrl+3" data-shortcut="3">
                <iconify-icon icon="lucide:monitor"></iconify-icon><span class="nav-label">场景</span>
                <span class="shortcut-badge">3</span>
            </button>
            <button class="nav-tab" id="btnEnv" title="环境" aria-label="环境" aria-controls="sceneOverlay" data-popup-type="env" data-hint="天空、照明、地面和粒子 · Ctrl+4" data-shortcut="4">
                <iconify-icon icon="lucide:cloud-sun"></iconify-icon><span class="nav-label">环境</span>
                <span class="shortcut-badge">4</span>
            </button>
            <button class="nav-tab" id="btnSettings" title="设置" aria-label="设置" aria-controls="sceneOverlay" data-popup-type="settings" data-hint="应用偏好设置 · Ctrl+5" data-shortcut="5">
                <iconify-icon icon="lucide:settings"></iconify-icon><span class="nav-label">设置</span>
                <span class="shortcut-badge">5</span>
            </button>
        </div>

        <!-- Playback Controls -->
        <div id="playbackBar">
            <button class="playback-btn" id="btnPlayPause">⏸</button>
            <button class="playback-btn" id="btnLoopToggle" title="循环播放"><iconify-icon icon="lucide:repeat"></iconify-icon></button>
            <div id="seekBar"><div id="seekProgress"></div></div>
            <span class="time-display" id="timeDisplay">00:00.00 / 00:00.00</span>
        </div>

        <!-- Current Model Info -->

        <!-- Scene Overlay (SlideMenu) -->
        <div id="sceneOverlay" data-overlay></div>

        <div id="statusBar"><span id="statusText">点击模型按钮打开模型库 · 拖拽旋转 · 滚轮缩放</span><span id="fpsClock">60 FPS | 00:00</span></div>

        <!-- Import Toast -->
        <div id="importToast" class="toast hidden">
            <div class="toast-icon">📦</div>
            <div class="toast-body">
                <div class="toast-title">检测到新文件</div>
                <div class="toast-file"></div>
            </div>
            <div class="toast-actions">
                <button class="toast-import-btn">导入</button>
                <button class="toast-ignore-btn">忽略</button>
            </div>
        </div>

        <!-- Drop Overlay -->
        <div id="dropOverlay">
            <div class="drop-indicator">
                <span class="drop-icon">📦</span>
                <span class="drop-text">释放文件以导入</span>
                <span class="drop-hint">支持 .zip · .pmx · .vmd</span>
            </div>
        </div>
    </div>
    <script src="./src/core/main.ts" type="module"></script>
</body>
</html>

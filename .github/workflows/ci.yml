name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: read

jobs:
  test-frontend:
    name: Frontend — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Lint
        run: npm run lint

      - name: i18n bundle parity check (strict)
        # ADR-059 §3.5 / ADR-041：翻译 bundle key 奇偶校验。
        # --strict 模式：任何 missing/extra key 均 exit 1 阻塞 CI。
        # 新增 key 必须同步翻译到所有 bundle，否则 CI 失败。
        run: node ../scripts/i18n-check.mjs --strict

      - name: ADR-117 Go error i18n lint (strict)
        # [doc:adr-117] Phase 3 防回归：internal/app 禁止 CJK fmt.Errorf、
        # frontend/src 禁止 `instanceof Error ? .message : String(` 直显反模式。
        # 任何违例即 exit 1 阻塞 CI，防止 Go 端错误 i18n 迁移成果回退。
        # 路径以仓库根为基准，与 cwd 无关。
        run: node ../scripts/goerr-lint.mjs --strict

      - name: Build
        run: npx vite build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/

  test-backend:
    name: Backend — Go Test & Build
    needs: test-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: go.sum

      - name: Download frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Linux deps (Wails v3)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgirepository1.0-dev

      - name: Go mod download
        run: go mod download

      - name: Run Go tests
        run: go test ./... -v -count=1

      - name: Go build
        run: go build ./...

  config-syntax:
    name: Config — Syntax Contract Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run config syntax test
        run: python tests/test_config_syntax.py

      - name: Check markdown links
        run: python tests/test_markdown_links.py

  # ============================================================
  # Version — tag vs package.json consistency
  # Ensures that if a tag exists (on PRs to main), the package.json
  # version matches it. Only meaningful on push/pull to main/master.
  # ============================================================
  version-check:
    name: Version — Consistency
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version vs latest tag
        run: |
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          echo "package.json version: $PKG_VER"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          if [ -n "$LATEST_TAG" ]; then
            echo "latest tag (stripped):   $LATEST_TAG"
            # On PR to main, the package.json should match or be greater than the latest tag
            # Normalize to dot-separated numeric for comparison
            if [ "$PKG_VER" != "$LATEST_TAG" ]; then
              echo "::warning::package.json version $PKG_VER differs from latest tag v$LATEST_TAG"
            else
              echo "✅ Version matches latest tag."
            fi
          else
            echo "No tags found — skipping comparison."
          fi

  # ============================================================
  # E2E — DOM/Overlay Gate (blocking)
  # Runs the @dom specs via Playwright's own Chromium against the
  # Vite dev server. No Wails runtime required → reliable on Linux.
  # @see docs/adr/adr-060-e2e-testing-strategy.md (Phase 3)
  # ============================================================
  e2e:
    name: E2E — DOM/Overlay Gate (@dom, vitePage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start Vite + run @dom E2E
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 &
          VITE_PID=$!
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:5173 >/dev/null; then
              echo "Vite dev server is up"; break
            fi
            sleep 2
          done
          npx playwright test --grep @dom --reporter=line
          TEST_EXIT=$?
          kill $VITE_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-dom-report
          path: frontend/playwright-report/

  # ============================================================
  # E2E — Full Integration (best-effort, non-blocking)
  # Runs the @webgl specs via connectOverCDP against the real Wails
  # WebView2. NOTE: connectOverCDP is Chromium-only; Wails on Linux
  # uses WebKitGTK whose remote inspector is NOT CDP-compatible, so
  # this job MUST run on windows-latest (native WebView2).
  # Flipped to blocking once validated on a real runner.
  # @see docs/adr/adr-060-e2e-testing-strategy.md (Phase 3b)
  # ============================================================
  e2e-wails:
    name: E2E — Full Integration (@webgl, wailsPage)
    runs-on: windows-latest
    needs: e2e
    continue-on-error: true
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: go.sum

      - name: Install Wails CLI (v3)
        working-directory: .
        run: |
          WAILS_VER=$(grep 'wails/v3' go.mod | head -1 | awk '{print $2}')
          echo "Installing wails3@$WAILS_VER"
          go install github.com/wailsapp/wails/v3/cmd/wails3@$WAILS_VER
          echo "WAILS_VER=$WAILS_VER" >> $GITHUB_ENV

      - name: Install frontend deps
        run: npm ci

      - name: Start Wails dev + run @webgl E2E
        env:
          # Expose CDP on WebView2 via MMCAR_DEBUG_PORT — main.go reads it and
          # injects --remote-debugging-port. WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS
          # is suppressed by Wails v3 (AdditionalBrowserArgs set explicitly).
          MMCAR_DEBUG_PORT: "9222"
        working-directory: .
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 dev &
          WAILS_PID=$!
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:9222/json/version >/dev/null; then
              echo "Wails WebView2 CDP is up"; break
            fi
            sleep 3
          done
          cd frontend
          npx playwright test --grep @webgl --reporter=line
          TEST_EXIT=$?
          kill $WAILS_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-webgl-report
          path: frontend/playwright-report/

      - name: WebGL Test Summary
        if: always()
        run: |
          if [ -f frontend/test-results/.last-run.json ]; then
            python3 -c "
          import json
          with open('frontend/test-results/.last-run.json') as f:
              d = json.load(f)
          p, fl, fa = d.get('passed',0), d.get('flaky',0), d.get('failed',0)
          if fa > 0:
              print(f'::warning title=@webgl ({fa} failed)::seed-model={d.get(\"suites\",[])}')
              print(f'::warning title=@webgl summary::{p} passed, {fa} failed, {fl} flaky')
          else:
              print(f'::notice title=@webgl summary::{p} passed, {fa} failed, {fl} flaky')
          "
          else
            echo '::notice title=@webgl report::test-results not found (all passed?)'
          fi

  ai-mistake-report:
    name: AI — Mistake Tracker Report
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run mistake tracker
        run: python tests/ai_mistake_tracker.py --limit 300 --json > ai-mistake-report.json

      - name: Print summary
        run: python tests/ai_mistake_tracker.py --limit 300

      - name: Upload report
        uses: actions/upload-artifact@v5
        with:
          name: ai-mistake-report
          path: ai-mistake-report.json

# Weekly @webgl Full Regression — windows-latest, blocking
#
# Runs the full @webgl suite weekly (no continue-on-error) to catch
# regressions that might go unnoticed in the best-effort CI job.
# Creates a GitHub issue on failure so the team gets a notification.
#
# @see docs/adr/adr-060-e2e-testing-strategy.md (Phase 3b)
# @see ci.yml → e2e-wails (best-effort daily run)

name: WebGL Weekly

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  webgl-regression:
    name: @webgl — Full Regression
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: go.sum

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Install Wails CLI (v3)
        working-directory: .
        run: |
          WAILS_VER=$(grep 'wails/v3' go.mod | head -1 | awk '{print $2}')
          echo "Installing wails3@$WAILS_VER"
          go install github.com/wailsapp/wails/v3/cmd/wails3@$WAILS_VER

      - name: Install frontend deps
        run: npm ci

      - name: Start Wails dev + run @webgl E2E (blocking)
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: "--remote-debugging-port=9222"
        working-directory: .
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 dev &
          WAILS_PID=$!
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:9222/json/version >/dev/null; then
              echo "Wails WebView2 CDP is up"; break
            fi
            sleep 3
          done
          cd frontend
          npx playwright test --grep @webgl --reporter=line
          TEST_EXIT=$?
          kill $WAILS_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-weekly-webgl
          path: frontend/playwright-report/

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['webgl-regression'],
            });
            // Avoid duplicate issues — if one is already open, update it
            const existing = issues.find(i =>
              i.title.includes('@webgl Weekly Regression')
            );
            const body = `## @webgl Weekly Regression — FAILED

            The weekly @webgl full regression **failed** on \`${context.ref}\`
            at \`${new Date().toISOString()}\`.

            - **Workflow run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            - **Commit**: ${context.sha}

            Check the uploaded Playwright report artifact for details.

            ---
            _Auto-generated by the webgl-weekly workflow._
            `;
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: 'open',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `@webgl Weekly Regression — FAILED (${new Date().toISOString().slice(0, 10)})`,
                body,
                labels: ['webgl-regression'],
              });
            }

# Doc Drift Weekly — docs/ drift sentinel
#
# Runs the doc-drift guard weekly to catch ERROR-level drift that slipped
# past the local pre-push hook (e.g. a forced `git push --no-verify`), and
# surfaces it as a single deduplicated GitHub issue.
#
# Complements:
#   - .githooks/pre-push   (status + funcmap + doc-drift, local, blocks push)
#   - .github/workflows/ci.yml (full check:docs on every PR)
#
# This is the *trend / backstop* layer: pre-push blocks at the edge; this
# workflow guarantees nothing drifted unnoticed if the hook was skipped.
#
# @see scripts/check-doc-drift.mjs --json
# @see .github/workflows/webgl-weekly.yml (issue dedup pattern)

name: Doc Drift Weekly

on:
  schedule:
    # Every Monday at 06:00 UTC (off-peak from webgl-weekly's Sunday run)
    - cron: '0 6 * * 1'
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  doc-drift:
    name: Doc Drift Sentinel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run doc-drift guard (JSON)
        run: node scripts/check-doc-drift.mjs --json > drift.json 2>/dev/null

      - name: Report drift as issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('drift.json', 'utf8'));
            const errors = Array.isArray(report.errors) ? report.errors : [];
            if (errors.length === 0) {
              console.log('No ERROR-level doc drift detected — nothing to file.');
              return;
            }
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['doc-drift'],
            });
            // Avoid duplicate issues — if one is already open, update it
            const existing = issues.find(i => i.title.includes('Doc Drift Weekly'));
            const body = `## Doc Drift Sentinel — ERROR-level drift detected

            The weekly doc-drift guard found **${errors.length}** blocking
            issue(s) on \`${context.ref}\` at \`${new Date().toISOString()}\`.

            ### Errors
            ${errors.map((e, i) => `${i + 1}. ${e}`).join('\n')}

            ### Stats
            - ADR max: ${report.adr?.max ?? '?'}
            - Knowledge cards: ${report.knowledge?.cards ?? '?'}
            - Reverse-lookup uncovered sources: ${report.reverse?.total ?? '?'}
            - Undocumented symbols: ${report.coverage?.undocumented ?? '?'}

            **Fix:** run \`npm run check:docs\` locally, apply the suggested
            \`gen:status\` / \`gen:funcmap\` regen, and push.

            ---
            _Auto-generated by the doc-drift-weekly workflow._
            `;
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: 'open',
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Doc Drift Weekly — drift detected (${new Date().toISOString().slice(0, 10)})`,
                body,
                labels: ['doc-drift'],
              });
              console.log('Created new doc-drift issue');
            }

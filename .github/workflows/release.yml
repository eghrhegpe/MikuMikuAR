name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_sign:
        description: 'Skip Android signing (debug only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  actions: read

env:
  GO_VERSION: '1.25.0'
  NODE_VERSION: '22'

jobs:
  # ── 读取版本号 ─────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      wails_ver: ${{ steps.ver.outputs.wails_ver }}
    steps:
      - uses: actions/checkout@v5
      - name: Extract version
        id: ver
        run: |
          VER=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VER" >> $GITHUB_OUTPUT
          WAILS_VER=$(grep 'wails/v3' go.mod | head -1 | sed 's/.* //;s/ *$//')
          echo "wails_ver=$WAILS_VER" >> $GITHUB_OUTPUT
          echo "Version: $VER  Wails: $WAILS_VER"

  # ── Windows 构建 ───────────────────────────────────────
  build-windows:
    name: Windows
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.os == 'Windows' && '~\AppData\Local\go-build' || '~/.cache/go-build' }}
          key: go-build-${{ runner.os }}-${{ env.GO_VERSION }}-${{ github.sha }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ env.GO_VERSION }}-
      - name: Cache Wails binary
        uses: actions/cache@v5
        id: cache-wails
        with:
          path: ${{ runner.os == 'Windows' && '~\go\bin\wails3.exe' || '~/go/bin/wails3' }}
          key: wails-${{ needs.prepare.outputs.wails_ver }}-${{ runner.os }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            nm-${{ runner.os }}-
      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ needs.prepare.outputs.wails_ver }}
      - name: Build
        run: .\scripts\build-windows.ps1 -Production
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-amd64
          path: dist/*.exe
          if-no-files-found: error

  # ── Linux 构建 ─────────────────────────────────────────
  build-linux:
    name: Linux
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ env.GO_VERSION }}-${{ github.sha }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ env.GO_VERSION }}-
      - name: Cache Wails binary
        uses: actions/cache@v5
        id: cache-wails-linux
        with:
          path: ~/go/bin/wails3
          key: wails-${{ needs.prepare.outputs.wails_ver }}-${{ runner.os }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            nm-${{ runner.os }}-
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgirepository1.0-dev
      - name: Install Wails
        if: steps.cache-wails-linux.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ needs.prepare.outputs.wails_ver }}
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npx vite build
      - name: Build
        run: |
          mkdir -p bin
          go build -tags production -ldflags="-X main.AppVersion=${{ needs.prepare.outputs.version }} -s -w" -o "bin/mikumikuar-${{ needs.prepare.outputs.version }}-linux-amd64"
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-amd64
          path: bin/mikumikuar-*
          if-no-files-found: error

  # ── Android 构建 ───────────────────────────────────────
  build-android:
    name: Android
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\go-build
          key: go-build-${{ runner.os }}-${{ env.GO_VERSION }}-${{ github.sha }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ env.GO_VERSION }}-
      - name: Cache Wails binary
        uses: actions/cache@v5
        id: cache-wails-android
        with:
          path: ~\go\bin\wails3.exe
          key: wails-${{ needs.prepare.outputs.wails_ver }}-${{ runner.os }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            nm-${{ runner.os }}-
      - name: Install Wails
        if: steps.cache-wails-android.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ needs.prepare.outputs.wails_ver }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android NDK & Build Tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.3.11579264"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('build/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npx vite build

      - name: Decode keystore (if available)
        run: |
          $dir = "${{ github.workspace }}\build\android\keystore"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          $file = "$dir\release.keystore"
          $b64 = '${{ secrets.ANDROID_KEYSTORE_BASE64 }}'
          if ([string]::IsNullOrWhiteSpace($b64)) {
            Write-Output "ANDROID_KEYSTORE_BASE64 not set — skipping signed build"
            return
          }
          [System.IO.File]::WriteAllBytes($file, [System.Convert]::FromBase64String($b64))
          Write-Output "Keystore decoded"

      - name: Check keystore exists
        id: check_ks
        run: |
          $ks = "${{ github.workspace }}\build\android\keystore\release.keystore"
          if (Test-Path $ks) { echo "has_keystore=true" >> $env:GITHUB_OUTPUT }
          else { echo "has_keystore=false" >> $env:GITHUB_OUTPUT }

      - name: Build Android (Release, signed)
        if: steps.check_ks.outputs.has_keystore == 'true' && github.event.inputs.skip_sign != 'true'
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}\build\android\keystore\release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build-android.ps1 -Arch arm64 -Production

      - name: Build Android (Debug, no sign)
        if: steps.check_ks.outputs.has_keystore != 'true' || github.event.inputs.skip_sign == 'true'
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build-android.ps1 -Arch arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-arm64
          path: dist/*.apk
          if-no-files-found: error

  # ── 合并发布 ───────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [prepare, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Check for hand-written release notes
        id: notes
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          NOTES_FILE="docs/Releases/v${VER}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$NOTES_FILE" >> $GITHUB_OUTPUT
            echo "Using hand-written notes: $NOTES_FILE"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No hand-written notes found, will auto-generate"
          fi

      - name: List assets
        run: ls -lh release-assets/

      - name: Create Release (hand-written notes)
        if: steps.notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: MikuMikuAR ${{ needs.prepare.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (auto-generated)
        if: steps.notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: MikuMikuAR ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

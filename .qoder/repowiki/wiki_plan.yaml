version: 1
scope:
  include: []
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - "bin/**"
    - "text-model/**"
    - "mmd_tools_repo/**"
    - "*.exe"
    - "*.log"
    - "*.py"
    - "*.json"
repowiki:
  template: architecture
  notes:
    - text: "项目使用 Wails v3 (Go 1.25 + WebView2)，前端 Vite + TypeScript + Babylon.js 9.x + babylon-mmd fork。物理层 XPBD(TS) + WASM Bullet 双引擎。"
    - text: "前端 strict:false 是历史遗留，新代码禁止新增 as any / @ts-ignore。路径别名 @/ → src/、@bindings/ → bindings/。"
    - text: "bindings/ 由 wails3 generate bindings 自动生成，禁止手写。src/core/wails-bindings.ts 是手维护的 re-export 聚合。"
    - text: "声明式菜单 Schema（ADR-093）是最高优先级架构约束：新增菜单面板必须定义 Schema，禁止直接调用 builder API。StatePath 前缀：env/render/light/ui/perception。"
    - text: "i18n 五语言（zh-CN/zh-TW/ja/en/ko），所有菜单 label 用 i18n key，禁止硬编码文字。错误信封机制见知识卡「跨语言错误处理与 i18n 信封机制」。"
    - text: "动作系统分两层：motion-algos/ 是纯 TS 算法层（无 Babylon 依赖），scene/motion/ 是 Babylon 桥接层。感知层（ADR-079）是动作系统新入口。"
    - text: "环境系统核心文件：env-bridge.ts（状态桥接）、env-impl.ts（实现）、env-texture.ts（纹理工厂 ADR-091）、env-water.ts（水面+平面反射 ADR-092）。"
    - text: "多 AI 协作规范：禁止 git stash，用 git commit + git reset --soft 做本地缓存。commit 格式 conventional commits。"
    - text: "已有知识卡必须在新文档中引用衔接：「配置系统」→ Go 后端 + 前端核心基础设施文档；「跨语言错误处理与 i18n 信封」→ Go 后端 + 前后端通信文档；「前后端轻量日志子系统」→ 前端核心基础设施文档；「跨平台构建与制品管理」→ 构建与测试文档；「多语言依赖与锁定文件策略」→ 项目总览 + 构建文档；「前端样式系统」→ 前端核心基础设施文档。"
    - text: "wiki 构建时必须保留并引用以下 6 张已有知识卡（不要重新生成重复内容）：配置系统、多语言依赖与锁定文件策略、前后端轻量日志子系统、跨语言错误处理与 i18n 信封机制、跨平台构建与制品管理、前端样式系统。"
    - text: "知识模块树 4 个节点与文档页面对应：根工程→项目总览；Go 后端核心→Go 后端服务层架构；前端应用→前端核心基础设施 + 3D 场景与渲染管线；构建脚本集→跨平台构建与测试体系；项目文档与编码奇谭→项目文档与决策记录。"
  documents:
    - title: "项目总览与技术栈"
      goal: "介绍 MikuMikuAR 的定位、技术选型、构建流程和目录结构全景；引用知识卡「多语言依赖与锁定文件策略」"
      parent: ""
      hints: "README.md, go.mod, package.json, Taskfile.yml, architecture.md, 知识卡:多语言依赖与锁定文件策略"

    - title: "Go 后端服务层架构"
      goal: "描述 internal/app 的 Wails 服务绑定、配置持久化、文件访问、模型库管理、代理层设计；引用知识卡「配置系统」「跨语言错误处理与 i18n 信封机制」"
      parent: ""
      hints: "internal/app/*.go, internal/i18nerr/, internal/dialogs/, internal/util/, 知识卡:配置系统, 知识卡:跨语言错误处理与i18n信封机制"

    - title: "前端核心基础设施"
      goal: "描述 core/ 模块：状态管理、i18n 体系、UI 组件层次、快捷键注册、资源加载管理；引用知识卡「配置系统」「前后端轻量日志子系统」「前端样式系统」"

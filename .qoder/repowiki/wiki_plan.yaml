knowledgecard:
  notes:
    - text: "前端模块边界：core/(基础设施) → scene/(3D渲染) → menus/(UI菜单) → motion-algos/(纯算法) → outfit/(换装) → physics/(物理辅助)。依赖方向单向，禁止反向引用。"
    - text: "状态管理唯一源：envState 是环境状态唯一来源，通过 reactivity.ts 的 signal/effect 驱动 UI 更新。禁止在模块级变量隐式修改状态。详见知识卡「配置系统：Go 后端 JSON 持久化 + 前端 Reactivity 状态管理」。"
    - text: "资源释放规范：每个 new Babylon 对象必须有对应 dispose()，observer 在 dispose 时移除。dispose 应级联释放子资源（参考 env-water.ts 的 RT+camera+observer 释放链）。"
    - text: "菜单开发规范：新增菜单必须使用声明式 Schema（menu-schema.ts 定义 ControlSpec），通过 menu-factory.ts 渲染。StatePath 格式：env.xxx/render.xxx/light.xxx/ui.xxx/perception.xxx。"
    - text: "测试策略：核心逻辑用 Vitest 单元测试（frontend/src/__tests__/），E2E 用 Playwright（frontend/e2e/），binding 一致性用 contract 测试校验。UI builder 允许无测试。"
    - text: "日志子系统：统一从 @/core/logger 导入 logInfo/logWarn/logError，禁止裸 console.*。异常处理用 safeCall 三件套（safeCall/safeCallVoid/safeCallAsync）。详见知识卡「前后端轻量日志子系统」。"
    - text: "跨语言错误处理：Go 端用 i18nerr.New() 构造 UserError，通过 @@GOERR@@ 哨兵传递 JSON 信封到前端，前端 goerr.ts 解析并翻译。详见知识卡「跨语言错误处理与 i18n 信封机制」。"
    - text: "样式系统：纯 CSS + CSS Variables，全部样式集中在 app.css 单文件。禁止硬编码颜色/字号，尺寸乘以 var(--ui-scale)。详见知识卡「前端样式系统：CSS 变量 + 单文件全局样式」。"
    - text: "依赖管理：Go 用 go.mod+go.sum，前端用 package.json+package-lock.json（npm 为默认）。修改 Go 导出后先 task generate:bindings 再开发。详见知识卡「多语言依赖与锁定文件策略」。"

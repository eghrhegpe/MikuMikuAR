<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>MikuMikuAR</title>
    <link rel="icon" href="data:,">
    <script>
        // 安卓闪退诊断 — 放在所有脚本之前，捕获早期加载错误
        (function() {
            var el = document.createElement('div');
            el.id = 'diag-error';
            el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a1a2e;color:#ff6b6b;font:13px monospace;padding:16px;white-space:pre-wrap;word-break:break-word;max-height:100vh;overflow:auto;display:none;';
            // 错误文本容器（先创建，复制按钮闭包引用）
            var textEl = document.createElement('div');
            textEl.style.cssText = 'margin-top:8px;';
            // 按钮容器（sticky 不随滚动消失，复制/关闭并排）
            var btnWrap = document.createElement('span');
            btnWrap.style.cssText = 'position:sticky;top:0;float:right;display:flex;gap:6px;';
            function mkBtn(label, onClick) {
                var b = document.createElement('span');
                b.textContent = label;
                b.style.cssText = 'cursor:pointer;font-size:12px;color:#ff6b6b;background:#1a1a2e;padding:2px 6px;border-radius:4px;user-select:none;';
                b.addEventListener('click', onClick);
                return b;
            }
            btnWrap.appendChild(mkBtn('\u590D\u5236', function() {
                var txt = textEl.textContent || '';
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(txt);
                } else {
                    var ta = document.createElement('textarea');
                    ta.value = txt; document.body.appendChild(ta); ta.select();
                    try { document.execCommand('copy'); } catch (e) {}
                    document.body.removeChild(ta);
                }
            }));
            btnWrap.appendChild(mkBtn('\u2715 \u5173\u95ED', function() { el.style.display = 'none'; }));
            el.appendChild(btnWrap);
            el.appendChild(textEl);
            (document.body || document.documentElement).appendChild(el);
            function show(e) {
                var msg = e && e.message ? e.message : String(e);
                if (e && e.stack) msg += '\n' + e.stack.split('\n').slice(0,5).join('\n');
                textEl.textContent += (textEl.textContent ? '\n---\n' : '') + msg;
                el.style.display = 'block';
            }
            window.onerror = function(msg, url, line, col, err) { show(err || msg); return true; };
            window.addEventListener('unhandledrejection', function(e) { show(e.reason); });
            // 捕获资源加载失败（如 babylon.js 404）
            document.addEventListener('error', function(e) {
                if (e.target && e.target.tagName === 'SCRIPT') show('Script load error: ' + e.target.src);
                if (e.target && e.target.tagName === 'LINK') show('Style load error: ' + e.target.href);
            }, true);
        })();
    </script>
    <!-- Babylon.js 必须在主 bundle 之前加载 -->
    <!-- TEMP: 注释掉验证闪退是否 babylon 加载导致 -->
    <script src="/lib/babylon.js"></script>
    <script src="/lib/babylonjs.materials.min.js"></script>
  <script type="module" crossorigin src="/assets/index-aX6VUAAV.js"></script>
</head>
<body>
    <div id="app">
        <canvas id="renderCanvas" role="img" aria-label="3D 场景" tabindex="0"></canvas>

<!-- Loading overlay: 内联样式确保 HTML 解析完就是全屏遮罩，不依赖 app.css -->
<div id="loading" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none;">
<div class="spinner"></div>
<span id="loadingText">正在加载 babymmd ...</span>
</div>

<!-- Bottom Navigation Bar - 静态页时禁用点击 -->
<div id="bottomNav">
<button class="nav-tab" id="btnMainAction" title="模型库" aria-label="模型库" aria-controls="sceneOverlay" data-popup-type="model" data-hint="浏览和加载 PMX 模型 · Ctrl+1" data-shortcut="1">
<iconify-icon icon="tabler:cube-3d-sphere"></iconify-icon><span class="nav-label">模型</span>
<span class="shortcut-badge">1</span>
</button>
<button class="nav-tab" id="btnMotionPopup" title="动作库" aria-label="动作库" aria-controls="sceneOverlay" data-popup-type="motion" data-hint="浏览和加载 VMD 动作 · Ctrl+2" data-shortcut="2">
<iconify-icon icon="lucide:music"></iconify-icon><span class="nav-label">动作</span>
<span class="shortcut-badge">2</span>
</button>
<button class="nav-tab" id="btnScene" title="场景" aria-label="场景" aria-controls="sceneOverlay" data-popup-type="scene" data-hint="相机、灯光和渲染设置 · Ctrl+3" data-shortcut="3">
<iconify-icon icon="lucide:monitor"></iconify-icon><span class="nav-label">场景</span>
<span class="shortcut-badge">3</span>
</button>
<button class="nav-tab" id="btnEnv" title="环境" aria-label="环境" aria-controls="sceneOverlay" data-popup-type="env" data-hint="天空、照明、地面和粒子 · Ctrl+4" data-shortcut="4">
<iconify-icon icon="lucide:cloud-sun"></iconify-icon><span class="nav-label">环境</span>
<span class="shortcut-badge">4</span>
</button>
<button class="nav-tab" id="btnSettings" title="设置" aria-label="设置" aria-controls="sceneOverlay" data-popup-type="settings" data-hint="应用偏好设置 · Ctrl+5" data-shortcut="5">
<iconify-icon icon="lucide:settings"></iconify-icon><span class="nav-label">设置</span>
<span class="shortcut-badge">5</span>
</button>
<button class="nav-tab" id="btnPlaza" title="模型广场" aria-label="模型广场" aria-controls="sceneOverlay" data-popup-type="plaza" data-hint="浏览模型资源站 · Ctrl+7" data-shortcut="7">
<iconify-icon icon="lucide:store"></iconify-icon><span class="nav-label">广场</span>
<span class="shortcut-badge">7</span>
</button>
</div>

<!-- Playback Controls — DOM 锚点，TS 初始化后填充 -->
<div id="playbackBar">
<button class="playback-btn" id="btnPlayPause"></button>
<button class="playback-btn" id="btnLoopToggle" title="循环播放"><iconify-icon icon="lucide:repeat"></iconify-icon></button>
<div id="seekBar"><div id="seekProgress"></div></div>
<span class="time-display" id="timeDisplay"></span>
</div>

<!-- Scene Overlay (SlideMenu) -->
<div id="sceneOverlay" data-overlay></div>

<!-- 模型广场：独立全屏视图层（非 SlideMenu 弹窗，见 ADR-075） -->
<div id="webviewLayer" data-overlay></div>

<!-- FPS 时钟 — 右上角 HUD，pointer-events: none（点击穿透） -->
<span id="fpsClock"></span>

<!-- 运行时模式徽标 — 右上角 HUD（fpsClock 下方），常驻显示 MPR/COI/SAB 状态，刷新不丢 -->
<span id="runtimeBadge"></span>

<!-- 状态栏 — 居中提示文字 -->
<div id="statusBar" role="status" aria-live="polite">
<span id="statusText"></span>
</div>

        <!-- Import Toast — DOM 锚点，TS 初始化后填充 i18n 文本 -->
        <div id="importToast" class="toast hidden">
            <div class="toast-icon"></div>
            <div class="toast-body">
                <div class="toast-title"></div>
                <div class="toast-file"></div>
            </div>
            <div class="toast-actions">
                <button class="toast-import-btn"></button>
                <button class="toast-ignore-btn"></button>
            </div>
        </div>

        <!-- Update Toast — DOM 锚点，TS 初始化后填充 i18n 文本 -->
        <div id="updateToast" class="toast hidden">
            <div class="toast-icon"></div>
            <div class="toast-body">
                <div class="toast-title"></div>
                <div class="toast-file"></div>
            </div>
            <div class="toast-actions">
                <button class="toast-import-btn"></button>
                <button class="toast-ignore-btn"></button>
            </div>
        </div>

        <!-- Drop Overlay — DOM 锚点，TS 初始化后填充 i18n 文本 -->
        <div id="dropOverlay">
            <div class="drop-indicator">
                <span class="drop-icon"></span>
                <span class="drop-text"></span>
                <span class="drop-hint"></span>
            </div>
        </div>
    </div>
</body>
</html>

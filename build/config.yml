version: '3'

info:
  companyName: "MikuMikuAR"
  productName: "MikuMikuAR"
  productIdentifier: "com.mikumikuar.app"
  description: "PMX Player with physics simulation"
  copyright: "(c) 2025, MikuMikuAR"
  comments: "MikuMikuAR �?PMX Player"
  version: "1.4.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/node_modules
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    # 只 watch Go：前端 ts/js 改动交给 Vite HMR 自行热刷新，不再重编 Go + 重启进程
    # （恢复接近 Wails v2 的“改 TS 不退出软件”体验；整页 reload 会重置前端运行时状态）
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations:
  - ext: pmx
    name: PMX Model
    description: PMX Model File
    role: Viewer
  - ext: vmd
    name: VMD Motion
    description: VMD Motion File
    role: Viewer
  - ext: mmascene
    name: MikuMikuAR Scene
    description: MikuMikuAR Scene File
    role: Editor
